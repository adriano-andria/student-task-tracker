<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Task Tracker Registration</title>
        <link rel="stylesheet" href="styles.css">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>

    <body>
        <header class="site-header"> 
            <h1>Task Tracker</h1>

            <nav class="site-nav" aria-label="Primary navigation">
                <ul class="nav-list">
                    <li><a href="index.html">Login</a></li>
                    <li><a href="register.html" aria-current="page">Register</a></li>
                    <li><a href="dashboard.html">Dashboard</a></li>
                </ul>
            </nav>
        </header>

        <main class="site-main" id="main">
            <h2>Create an account</h2>

            <form class="auth-form" action="#" method="post">
                <p>Fill in your details to sign up.</p>

                <div class="field">
                    <label for="full-name">Full name</label>
                    <input id="full-name" name="fullName" type="text" required autocomplete="name">
                </div>

                <div class="field">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" required autocomplete="email">
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" required autocomplete="new-password">
                </div>

                <div class="field">
                    <label for="confirm-password">Confirm password</label>
                    <input id="confirm-password" name="confirmPassword" type="password" required autocomplete="new-password">
                </div>

                <button class="btn" type="submit">Create account</button>
            </form>
        </main>

    </body>



</html>
